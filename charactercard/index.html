<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Card</title>
    <link rel="stylesheet" href="charactercard.css">
    <script src="charactercard.js" defer></script>

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Character Card">
    <meta property="og:description" content="Put Page Description Here">
    <meta property="og:url" content="https://yourURLofPage.here">
    <meta property="og:image" content="https://yourURLofSocialPreviewImageHere.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Character Card">
    <meta name="twitter:description" content="Put Page Description Here">
    <meta name="twitter:image" content="https://yourURLofSocialPreviewImageHere.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
</head>

<body>
    <div class="card">
        <img class="image" src="https://andejuli.github.io/wdd131/character_card/snortleblat.webp" alt="Character">

        <div class="name" id="charName">Snortleblat</div>

        <div class="stats">
            <p id="charClass">Class: Swamp Beast Diplomat</p>
            <p id="charLevel">Level: 1</p>
            <p id="charHealth">Health: 100</p>
        </div>

        <div class="buttons">
            <button onclick="character.attacked()">Attack</button>
            <button onclick="character.levelUp()">Level Up</button>
        </div>
    </div>
</body>

</html>
