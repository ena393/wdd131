<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Ticket Form</title>
    <link rel="stylesheet" href="eventform.css" />
    <script src="eventform.js" defer></script>
</head>

<body>
    <main class="wrapper">
        <h1>Event Ticket</h1>

        <form id="fsyForm">
            <div class="field">
                <label for="firstName">First Name</label>
                <input id="firstName" name="firstName" type="text" required />
            </div>

            <div class="field">
                <label for="lastName">Last Name</label>
                <input id="lastName" name="lastName" type="text" required />
            </div>

            <div class="field full">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required />
            </div>

            <div class="field">
                <label for="eventType">Type</label>
                <select id="eventType" name="eventType" aria-controls="notesContainer" required>
                    <option value="">Choose one</option>
                    <option value="student">Student</option>
                    <option value="guest">Guest</option>
                </select>
            </div>

            <div class="field">
                <label for="eventDate">Event Date</label>
                <input id="eventDate" name="eventDate" type="date" required />
            </div>

            <div id="studentContainer" class="field full" hidden>
                <label for="studentId">Student I#</label>
                <input id="studentId" name="studentId" type="text" />
            </div>

            <div id="guestContainer" class="field full" hidden>
                <label for="accessCode">Access Code</label>
                <input id="accessCode" name="accessCode" type="text" />
            </div>

            <button class="full" type="submit">Create Ticket</button>
        </form>

        <section id="output" aria-live="polite"></section>
    </main>
</body>

</html>
